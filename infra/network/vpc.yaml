# =============================================================================
# vpc.yaml
# CloudFormation template for open-supervisor VPC networking infrastructure.
#
# Creates:
#   - VPC (10.0.0.0/16) with DNS support
#   - 2 public subnets (10.0.1.0/24, 10.0.2.0/24) in different AZs for ALB
#   - 2 private subnets (10.0.3.0/24, 10.0.4.0/24) for ECS Fargate tasks
#   - Internet Gateway for public subnet egress
#   - NAT Gateway (single-AZ for staging) with EIP for private subnet egress
#   - Route tables with appropriate routes
#   - Security Groups: alb-sg, bff-sg, sse-server-sg, auth-service-sg
#   - Application Load Balancer (internet-facing) for BFF
#   - IAM role ecs-task-execution with ECR, CloudWatch Logs, SSM permissions
#
# Outputs:
#   - VpcId, PublicSubnetIds, PrivateSubnetIds
#   - AlbDnsName, AlbTargetGroupArn
#   - SecurityGroupIds
# =============================================================================

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  VPC networking infrastructure for open-supervisor backend services.
  Creates VPC, subnets, NAT Gateway, Internet Gateway, ALB, Security Groups,
  and IAM execution role for ECS Fargate deployment.

# ── Parameters ────────────────────────────────────────────────────────────────
Parameters:
  EnvironmentName:
    Type: String
    Default: staging
    Description: Environment name used for resource tagging and naming
    AllowedValues:
      - staging
      - production

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR for public subnet 1 (ALB, NAT Gateway)

  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR for public subnet 2 (ALB)

  PrivateSubnet1Cidr:
    Type: String
    Default: 10.0.3.0/24
    Description: CIDR for private subnet 1 (ECS tasks)

  PrivateSubnet2Cidr:
    Type: String
    Default: 10.0.4.0/24
    Description: CIDR for private subnet 2 (ECS tasks)

  AvailabilityZone1:
    Type: String
    Default: us-east-1a
    Description: First availability zone
    AllowedPattern: '[a-z]{2}-[a-z]+-\d[a-z]'

  AvailabilityZone2:
    Type: String
    Default: us-east-1b
    Description: Second availability zone
    AllowedPattern: '[a-z]{2}-[a-z]+-\d[a-z]'

# ── Resources ─────────────────────────────────────────────────────────────────
Resources:

  # ── VPC ─────────────────────────────────────────────────────────────────────
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-vpc'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: open-supervisor

  # ── Internet Gateway ────────────────────────────────────────────────────────
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-igw'
        - Key: Environment
          Value: !Ref EnvironmentName

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # ── Public Subnets ──────────────────────────────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Ref AvailabilityZone1
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-public-1'
        - Key: Type
          Value: public
        - Key: Environment
          Value: !Ref EnvironmentName

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Ref AvailabilityZone2
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-public-2'
        - Key: Type
          Value: public
        - Key: Environment
          Value: !Ref EnvironmentName

  # ── Private Subnets ─────────────────────────────────────────────────────────
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Ref AvailabilityZone1
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-private-1'
        - Key: Type
          Value: private
        - Key: Environment
          Value: !Ref EnvironmentName

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Ref AvailabilityZone2
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-private-2'
        - Key: Type
          Value: private
        - Key: Environment
          Value: !Ref EnvironmentName

  # ── NAT Gateway ─────────────────────────────────────────────────────────────
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-nat-eip'
        - Key: Environment
          Value: !Ref EnvironmentName

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-nat'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ── Route Tables ────────────────────────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-rt-public'
        - Key: Environment
          Value: !Ref EnvironmentName

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-rt-private-1'
        - Key: Environment
          Value: !Ref EnvironmentName

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: '0.0.0.0/0'
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-rt-private-2'
        - Key: Environment
          Value: !Ref EnvironmentName

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: '0.0.0.0/0'
      NatGatewayId: !Ref NatGateway

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable2

  # ── Security Groups ────────────────────────────────────────────────────────

  # ALB Security Group: allows HTTP (80) from internet
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Internet-facing ALB — allow HTTP on port 80
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
          Description: HTTP traffic from anywhere
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-alb-sg'
        - Key: Environment
          Value: !Ref EnvironmentName

  # BFF Security Group: allows inbound from ALB on port 3000
  BffSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: BFF service — allow inbound from ALB on port 3000
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: Inbound from ALB to BFF on port 3000
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-bff-sg'
        - Key: Environment
          Value: !Ref EnvironmentName

  # SSE Server Security Group: allows inbound from BFF on port 3002
  SseServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SSE server — allow inbound from BFF on port 3002
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3002
          ToPort: 3002
          SourceSecurityGroupId: !Ref BffSecurityGroup
          Description: Inbound from BFF to SSE server on port 3002
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-sse-server-sg'
        - Key: Environment
          Value: !Ref EnvironmentName

  # Auth Service Security Group: allows inbound from BFF on port 3001
  AuthServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Authorization service — allow inbound from BFF on port 3001
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref BffSecurityGroup
          Description: Inbound from BFF to auth service on port 3001
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-auth-service-sg'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ── Application Load Balancer ──────────────────────────────────────────────
  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'open-supervisor-${EnvironmentName}-alb'
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      # SSE long-lived connections require high idle timeout
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '3600'
        - Key: routing.http.desync_mitigation_mode
          Value: defensive
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-alb'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ALB Listener on port 80 (HTTP)
  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BffTargetGroup

  # BFF Target Group
  BffTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'open-supervisor-${EnvironmentName}-bff-tg'
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref Vpc
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckPort: '3000'
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-bff-tg'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ── IAM Role: ECS Task Execution ───────────────────────────────────────────
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'open-supervisor-${EnvironmentName}-ecs-task-execution'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Name
          Value: !Sub 'open-supervisor-${EnvironmentName}-ecs-task-execution'
        - Key: Environment
          Value: !Ref EnvironmentName

  EcsTaskExecutionPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub 'open-supervisor-${EnvironmentName}-ecs-task-execution-policy'
      Roles:
        - !Ref EcsTaskExecutionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # ECR: allow pulling images
          - Effect: Allow
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
              - ecr:GetAuthorizationToken
            Resource: '*'
          # CloudWatch Logs: allow writing logs
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
            Resource: '*'
          # SSM: allow reading configuration parameters
          - Effect: Allow
            Action:
              - ssm:GetParameters
              - ssm:GetParameter
            Resource: '*'
          # Secrets Manager: allow reading secrets
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: '*'
          # KMS: allow decrypting SSM SecureStrings
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource: '*'

# ── Outputs ───────────────────────────────────────────────────────────────────
Outputs:
  VpcId:
    Description: VPC ID for the open-supervisor networking stack
    Value: !Ref Vpc
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'

  PublicSubnetIds:
    Description: List of public subnet IDs (ALB subnets)
    Value: !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2]]
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnetIds'

  PrivateSubnetIds:
    Description: List of private subnet IDs (ECS task subnets)
    Value: !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnetIds'

  PublicSubnet1Id:
    Description: Public subnet 1 ID
    Value: !Ref PublicSubnet1

  PublicSubnet2Id:
    Description: Public subnet 2 ID
    Value: !Ref PublicSubnet2

  PrivateSubnet1Id:
    Description: Private subnet 1 ID
    Value: !Ref PrivateSubnet1

  PrivateSubnet2Id:
    Description: Private subnet 2 ID
    Value: !Ref PrivateSubnet2

  AlbSecurityGroupId:
    Description: ALB Security Group ID
    Value: !Ref AlbSecurityGroup

  BffSecurityGroupId:
    Description: BFF Security Group ID
    Value: !Ref BffSecurityGroup

  SseServerSecurityGroupId:
    Description: SSE Server Security Group ID
    Value: !Ref SseServerSecurityGroup

  AuthServiceSecurityGroupId:
    Description: Auth Service Security Group ID
    Value: !Ref AuthServiceSecurityGroup

  SecurityGroupIds:
    Description: Comma-separated list of all application security group IDs
    Value:
      Fn::Join:
        - ','
        - - !Ref AlbSecurityGroup
          - !Ref BffSecurityGroup
          - !Ref SseServerSecurityGroup
          - !Ref AuthServiceSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupIds'

  AlbDnsName:
    Description: ALB DNS name for DNS CNAME or Route53 alias
    Value: !GetAtt Alb.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-AlbDnsName'

  AlbCanonicalHostedZoneId:
    Description: ALB canonical hosted zone ID for Route53 alias
    Value: !GetAtt Alb.CanonicalHostedZoneId

  AlbTargetGroupArn:
    Description: ARN of the BFF target group
    Value: !Ref BffTargetGroup
    Export:
      Name: !Sub '${AWS::StackName}-AlbTargetGroupArn'

  EcsTaskExecutionRoleArn:
    Description: ARN of the ECS task execution IAM role
    Value: !GetAtt EcsTaskExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EcsTaskExecutionRoleArn'

  VpcCidr:
    Description: VPC CIDR block
    Value: !Ref VpcCidr
