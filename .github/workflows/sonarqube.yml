# SonarQube Quality Gate CI workflow
#
# Runs SonarQube analysis and Quality Gate evaluation on every PR toward `main`
# and on push to `main` (to establish baseline for "New Code" comparison).
#
# Uses an ephemeral SonarQube Community Edition service container.
# SonarQube 2026+ generates a random admin password on first startup.
# A bootstrap step extracts it from container logs to create the three
# projects via REST API. The scanner then runs without credentials
# (forceAuthentication=false allows anonymous analysis of existing projects).
#
# Dependencies: sonar-project.properties per service (US-02),
# Quality Gate definition applied to SonarQube (US-03).

name: SonarQube Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Ephemeral SonarQube Community Edition container
    services:
      sonarqube:
        image: sonarqube:26.6.0.123539-community
        ports:
          - 9000:9000
        env:
          # Disable Elasticsearch bootstrap checks for single-node ephemeral use
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
          # Disable forced authentication for ephemeral CI container
          # (SonarQube 10+/2026+ no longer accepts default admin/admin)
          SONAR_FORCEAUTHENTICATION: "false"
        options: >-
          --health-cmd "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 60s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Setup ──────────────────────────────────────────────────────────────

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm -r build

      # ── Tests with coverage ────────────────────────────────────────────────

      - name: Run tests with coverage
        run: |
          pnpm --filter authorization-service test --collectCoverage
          pnpm --filter bff test --collectCoverage
          pnpm --filter sse-server test --collectCoverage

      # ── Bootstrap SonarQube projects ────────────────────────────────────────
      # SonarQube 2026+ generates a random admin password on first startup.
      # The scanner cannot create projects as an anonymous user (even with
      # forceAuthentication=false). We extract the password from container logs,
      # create the three projects via REST API, and then the scanner only needs
      # to analyze existing projects (works without credentials).

      - name: Bootstrap SonarQube — create projects
        run: |
          set -e

          echo "🔧 Extracting SonarQube admin password from container logs..."

          # Find the SonarQube container
          CONTAINER_ID=$(docker ps -q --filter "expose=9000" --filter "status=running" | head -1)

          if [ -z "$CONTAINER_ID" ]; then
            echo "❌ SonarQube container not found"
            exit 1
          fi

          # Extract admin password from container logs
          # SonarQube 2026+ logs: "Default admin password: <token>" or similar
          ADMIN_PASSWORD=$(docker logs "$CONTAINER_ID" 2>&1 | \
            grep -oP '(?:Default admin password|Admin password):\s*\K\S+' | tail -1 || echo "")

          if [ -z "$ADMIN_PASSWORD" ]; then
            echo "⚠️  Could not extract admin password from logs"
            echo "   Trying default admin/admin..."
            ADMIN_PASSWORD="admin"
          else
            echo "✅ Admin password extracted"
          fi

          # Create the three projects via REST API
          echo ""
          echo "📦 Creating SonarQube projects..."

          PROJECTS=(
            "open-supervisor-authorization-service"
            "open-supervisor-bff"
            "open-supervisor-sse-server"
          )

          for PROJECT in "${PROJECTS[@]}"; do
            echo "  Creating: $PROJECT"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "admin:$ADMIN_PASSWORD" \
              -X POST \
              "http://localhost:9000/api/projects/create?name=${PROJECT}&project=${PROJECT}" || echo "000")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "    ✅ Created (HTTP $HTTP_CODE)"
            elif [ "$HTTP_CODE" = "400" ]; then
              echo "    ℹ️  Already exists (HTTP $HTTP_CODE)"
            else
              echo "    ⚠️  Unexpected response (HTTP $HTTP_CODE)"
            fi
          done

          echo ""
          echo "✅ SonarQube bootstrap complete"

      # ── SonarScanner analysis ──────────────────────────────────────────────

      - name: SonarScanner — authorization-service
        working-directory: apps/authorization-service
        run: |
          npx sonar-scanner \
            -Dsonar.host.url=http://localhost:9000

      - name: SonarScanner — bff
        working-directory: apps/bff
        run: |
          npx sonar-scanner \
            -Dsonar.host.url=http://localhost:9000

      - name: SonarScanner — sse-server
        working-directory: apps/sse-server
        run: |
          npx sonar-scanner \
            -Dsonar.host.url=http://localhost:9000

      # ── Quality Gate polling ───────────────────────────────────────────────

      - name: Poll Quality Gate status
        run: |
          set -e

          PROJECTS=(
            "open-supervisor-authorization-service:authorization-service"
            "open-supervisor-bff:bff"
            "open-supervisor-sse-server:sse-server"
          )

          FAILED=false

          # ── Phase 1: Wait for background tasks to complete ────────────────
          echo "⏳ Waiting for SonarQube background tasks..."
          echo ""

          for ENTRY in "${PROJECTS[@]}"; do
            PROJECT_KEY="${ENTRY%%:*}"
            SERVICE_NAME="${ENTRY##*:}"

            echo "  Waiting for $SERVICE_NAME ($PROJECT_KEY)..."
            for i in $(seq 1 12); do
              # Poll ce/component to get the latest analysis task status
              CE_RESPONSE=$(curl -sf \
                "http://localhost:9000/api/ce/component?componentKey=$PROJECT_KEY" 2>/dev/null \
                || echo '{"current":{"status":"UNKNOWN"}}')
              TASK_STATUS=$(echo "$CE_RESPONSE" | jq -r '.current.status // "UNKNOWN"')

              if [ "$TASK_STATUS" = "SUCCESS" ] || [ "$TASK_STATUS" = "null" ]; then
                echo "    ✅ $SERVICE_NAME: task completed"
                break
              elif [ "$TASK_STATUS" = "FAILED" ] || [ "$TASK_STATUS" = "CANCELED" ]; then
                echo "    ❌ $SERVICE_NAME: task $TASK_STATUS"
                FAILED=true
                break
              else
                echo "    ⏳ $SERVICE_NAME: task $TASK_STATUS (attempt $i/12 — waiting 10s)"
                sleep 10
              fi
            done
          done

          # ── Phase 2: Fetch Quality Gate status ──────────────────────────
          echo ""
          echo "🔎 Checking Quality Gate status..."

          for ENTRY in "${PROJECTS[@]}"; do
            PROJECT_KEY="${ENTRY%%:*}"
            SERVICE_NAME="${ENTRY##*:}"

            RESPONSE=$(curl -sf \
              "http://localhost:9000/api/qualitygates/project_status?projectKey=$PROJECT_KEY" 2>/dev/null \
              || echo '{"projectStatus":{"status":"NONE"}}')
            GATE_STATUS=$(echo "$RESPONSE" | jq -r '.projectStatus.status // "NONE"')

            if [ "$GATE_STATUS" = "OK" ]; then
              echo "  ✅ $SERVICE_NAME: PASSED (status: $GATE_STATUS)"
            elif [ "$GATE_STATUS" = "ERROR" ]; then
              echo "  ❌ $SERVICE_NAME: FAILED (status: $GATE_STATUS)"
              echo "::error title=Quality Gate FAILED::$SERVICE_NAME ($PROJECT_KEY) reports ERROR"
              FAILED=true
            else
              echo "  ⚠️  $SERVICE_NAME: $GATE_STATUS (no analysis found)"
              echo "::warning::$SERVICE_NAME — Quality Gate not evaluated"
            fi
          done

          # ── Phase 3: Fail pipeline if any service failed the gate ────────

          if [ "$FAILED" = true ]; then
            echo ""
            echo "❌ Quality Gate FAILED for one or more services"
            exit 1
          fi

          echo ""
          echo "✅ All services passed the Quality Gate"
