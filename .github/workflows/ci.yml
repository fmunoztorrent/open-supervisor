name: CI

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

jobs:
  validate:
    name: Tests + Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm -r build

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run lint
        run: pnpm lint

  e2e:
    name: E2E (Detox + Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm -r build

      - name: Start mock BFF server
        working-directory: apps/mobile
        run: node e2e/mock-server/index.js &

      - name: Build APK + Run Detox tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          avd-name: open_supervisor
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            cd apps/mobile
            pnpm detox:build
            pnpm detox:test
